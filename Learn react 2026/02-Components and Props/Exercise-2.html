<!doctype html>
<html>
  <head>
    <title>Exercise 2</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({ productName, price, discountPrice, imgSrc }) {
        return (
          <>
            <div>
              <img src={imgSrc} width="70" height="70" />
            </div>
            <p>{productName}</p>
            {discountPrice ? (
              <>
                <del>Price: ${price}</del>
                {discountPrice && <p>Discounted Price: ${discountPrice}</p>}
              </>
            ) : (
              <p>Price: ${price}</p>
            )}
            <button>Add to cart</button>
          </>
        );
      }
      function App() {
        return (
          <>
            <ProductDetails
              productName="Cotton Socks"
              price="10.90"
              discountPrice="5.45"
              imgSrc="./assets/cotton-socks.png"
            />
            ;
            <ProductDetails
              productName="Tennis ball"
              price="6.00"
              imgSrc="./assets/tennis-balls.png"
            />
            ;
            <ProductDetails
              productName="Plain T-shirt"
              price="7.99"
              imgSrc="./assets/plain-t-shirt.png"
            />
            ;
          </>
        );
      }
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
